<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Çilek Otomasyon Paneli</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><text y=%2226%22 font-size=%2226%22>🍓</text></svg>">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">

  <header>
    <div>
      <h1>🍓 Çilek Otomasyon</h1>
      <p class="subtitle">Canlı sera izleme ve kontrol paneli</p>
    </div>
    <div class="header-status">
      <div id="connStatus" class="badge"><span class="dot"></span>Bağlanıyor...</div>
      <div id="lastUpdate" class="last-update"></div>
    </div>
  </header>

  <nav class="quicknav" aria-label="Hızlı gezinme">
    <a href="#durum">Durum</a>
    <a href="#iklim">İklim</a>
    <a href="#kok-substrat">Kök &amp; Substrat</a>
    <a href="#sulama">Sulama</a>
    <a href="#guc">Güç</a>
    <a href="#role">Röle</a>
    <a href="#uyarilar">Uyarılar</a>
    <a href="#gecmis">Geçmiş</a>
  </nav>

  <section class="status-strip" id="durum">
    <div id="statusStrip"></div>
  </section>

  <section class="panel" id="iklim">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13.5V4a2 2 0 1 1 4 0v9.5a4 4 0 1 1-4 0z"/></svg>İklim</h2>
    <div class="grid" id="cardsClimate"></div>
  </section>

  <section class="panel" id="kok-substrat">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Kök &amp; Substrat</h2>
    <div class="grid" id="cardsRoot"></div>
  </section>

  <section class="panel" id="sulama">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2s7 7.5 7 12a7 7 0 1 1-14 0c0-4.5 7-12 7-12z"/></svg>Sulama</h2>
    <div class="grid" id="cardsIrrigation"></div>
  </section>

  <section class="panel" id="guc">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"/></svg>Güç</h2>
    <div class="grid" id="cardsPower"></div>
  </section>

  <section class="panel" id="role">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="8" width="20" height="8" rx="4"/><circle cx="8" cy="12" r="2.5" fill="currentColor" stroke="none"/></svg>Röle Kontrolü</h2>
    <div class="relays" id="relayControls"></div>
  </section>

  <section class="panel" id="uyarilar">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0-6 6v4l-2 4h16l-2-4V9a6 6 0 0 0-6-6z"/><path d="M9.5 20.5a2.5 2.5 0 0 0 5 0"/></svg>Uyarılar</h2>
    <div id="alarms"></div>
    <button id="clearFaultsBtn">Arızaları Temizle</button>
  </section>

  <section class="panel" id="gecmis">
    <h2><svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19V5M4 19h16M8 15l3-4 3 3 4-6"/></svg>Geçmiş (24 saat)</h2>
    <div id="historyCharts"></div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
